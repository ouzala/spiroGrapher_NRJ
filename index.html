<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinematic Linkage Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        /* Left panel: toolbar */
        .toolbar {
            width: 220px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            padding: 12px;
            overflow-y: auto;
        }

        .toolbar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin: 12px 0 8px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid #3e3e42;
        }

        .tool-button {
            padding: 8px 12px;
            margin: 4px 0;
            background: #3e3e42;
            border: 1px solid #555;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .tool-button:hover {
            background: #4e4e52;
            border-color: #007acc;
        }

        .tool-button.active {
            background: #007acc;
            border-color: #0098ff;
        }

        .tool-group {
            margin-bottom: 16px;
        }

        .solver-toggle-button {
            width: 100%;
            text-align: left;
            line-height: 1.4;
        }

        .solver-toggle-button strong {
            display: block;
            font-size: 12px;
            font-weight: 600;
        }

        .solver-toggle-button span {
            display: block;
            font-size: 10px;
            color: #b8b8b8;
        }

        .control-card {
            background: #2b2b2e;
            border: 1px solid #3e3e42;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }

        .control-card h4 {
            font-size: 11px;
            text-transform: uppercase;
            color: #9aa0a6;
            margin-bottom: 10px;
            letter-spacing: 0.04em;
        }

        .inline-controls {
            display: flex;
            gap: 8px;
        }

        .inline-controls .tool-button {
            flex: 1;
            margin: 0;
            padding: 7px 10px;
        }

        .disc-rpm-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .disc-rpm-row {
            padding: 8px;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            background: #202124;
        }

        .disc-rpm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #c7cbd1;
            margin-bottom: 6px;
        }

        .disc-rpm-empty {
            font-size: 11px;
            color: #777;
            line-height: 1.5;
        }

        .status-display {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid #3e3e42;
            font-size: 11px;
            color: #888;
            line-height: 1.6;
        }

        .status-label {
            color: #999;
            font-weight: bold;
        }

        /* Main canvas area */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }

        #canvas {
            flex: 1;
            background: linear-gradient(135deg, #2d2d30 0%, #1e1e1e 100%);
            cursor: crosshair;
            display: block;
        }

        /* Playback controls */
        .playback-controls {
            height: 60px;
            background: #252526;
            border-top: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
        }

        .playback-button {
            padding: 6px 12px;
            background: #3e3e42;
            border: 1px solid #555;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
            transition: all 0.2s;
            flex: 0 0 auto;
        }

        .playback-button:hover {
            background: #4e4e52;
            border-color: #007acc;
        }

        .playback-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #btn-play,
        #btn-pause,
        #btn-system-play,
        #btn-system-pause {
            display: none;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            max-width: 250px;
        }

        .slider-label {
            font-size: 11px;
            color: #888;
            min-width: 50px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: #3e3e42;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #007acc;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #007acc;
            cursor: pointer;
            border: none;
        }

        .time-display {
            font-size: 11px;
            color: #888;
            min-width: 80px;
            text-align: right;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 20px;
            min-width: 300px;
        }

        .modal-content h3 {
            margin-bottom: 12px;
            font-size: 14px;
        }

        .modal-input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #e0e0e0;
            border-radius: 2px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 6px 12px;
            background: #3e3e42;
            border: 1px solid #555;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 2px;
            font-size: 12px;
        }

        .modal-buttons button.primary {
            background: #007acc;
            border-color: #0098ff;
        }

        .modal-buttons button:hover {
            background: #4e4e52;
        }

        .modal-buttons button.primary:hover {
            background: #0098ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Toolbar -->
        <div class="toolbar">
            <h3>Solver</h3>
            <div class="tool-group">
                <button class="tool-button solver-toggle-button" id="btn-toggle-solver">
                    <strong>Solver: Hybrid</strong>
                    <span>Click to cycle solver mode</span>
                </button>
            </div>

            <h3>Building Tools</h3>
            <div class="tool-group">
                <button class="tool-button" id="tool-disc">+ Add Disc</button>
                <button class="tool-button" id="tool-stick">+ Add Stick</button>
                <button class="tool-button" id="tool-anchor">+ Add Anchor</button>
                <button class="tool-button" id="tool-pencil">+ Add Pencil</button>
            </div>

            <h3>System</h3>
            <div class="tool-group">
                <button class="tool-button" id="btn-validate">Validate System</button>
                <button class="tool-button" id="btn-print">Print System</button>
                <button class="tool-button" id="btn-load-test">Load Test Setup</button>
                <button class="tool-button" id="btn-clear">Clear All</button>
                <button class="tool-button" id="btn-clear-traces">Clear Trace</button>
                <button class="tool-button" id="btn-toggle-mechanics">Hide Mechanics</button>
                <div class="control-card">
                    <h4>Playback</h4>
                    <div class="inline-controls">
                        <button class="tool-button" id="btn-system-step-backward">Step &lt;&lt;</button>
                        <button class="tool-button" id="btn-system-play-toggle">Play</button>
                        <button class="tool-button" id="btn-system-step-forward">Step &gt;&gt;</button>
                    </div>
                </div>
                <div class="control-card">
                    <h4>RPM Speed</h4>
                    <div class="disc-rpm-list" id="disc-rpm-controls">
                        <div class="disc-rpm-empty">Add discs to create live RPM controls.</div>
                    </div>
                </div>
            </div>

            <div class="status-display">
                <div><span class="status-label">Discs:</span> <span id="status-discs">0</span></div>
                <div><span class="status-label">Chains:</span> <span id="status-chains">0</span></div>
                <div><span class="status-label">Pencils:</span> <span id="status-pencils">0</span></div>
                <div style="margin-top: 8px; border-top: 1px solid #3e3e42; padding-top: 8px;">
                    <div id="status-message" style="color: #888; font-size: 10px; line-height: 1.4;">Ready</div>
                </div>
            </div>
        </div>

        <!-- Right Canvas Area -->
        <div class="canvas-area">
            <canvas id="canvas"></canvas>

            <!-- Playback Controls -->
            <div class="playback-controls">
                <button class="playback-button" id="btn-step-backward" title="Step backward">Step &lt;&lt;</button>
                <button class="playback-button" id="btn-play-toggle">Play</button>
                <button class="playback-button" id="btn-play">▶ Play</button>
                <button class="playback-button" id="btn-pause" disabled>⏸ Pause</button>
                <button class="playback-button" id="btn-reset">⟲ Reset</button>
                
                <button class="playback-button" id="btn-step-forward" title="Step forward">Step &gt;&gt;</button>
                <div class="slider-group">
                    <span class="slider-label">Speed:</span>
                    <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1">
                    <span class="time-display"><span id="speed-value">1.0x</span></span>
                </div>

                <div class="time-display">
                    Time: <span id="time-display">0.00s</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Modals -->
    <div class="modal" id="modal-disc">
        <div class="modal-content">
            <h3 id="modal-disc-title">Set Disc RPM</h3>
            <label>Radius (mm):</label>
            <input type="number" class="modal-input" id="input-disc-radius" min="5" max="100" value="30">
            <label>RPM:</label>
            <input type="number" class="modal-input" id="input-disc-rpm" min="1" max="600" value="60">
            <label for="input-disc-torque">Torque: <span id="input-disc-torque-value">100%</span></label>
            <input type="range" class="modal-input" id="input-disc-torque" min="0" max="100" step="1" value="100">
            <div class="modal-buttons">
                <button id="btn-delete-disc" style="display: none;">Delete</button>
                <button id="btn-cancel-disc">Cancel</button>
                <button class="primary" id="btn-confirm-disc">OK</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-stick">
        <div class="modal-content">
            <h3 id="stick-menu-title">Stick Actions</h3>
            <label for="input-stick-stiffness">Stiffness (%): <span id="input-stick-stiffness-value">100%</span></label>
            <input type="range" class="modal-input" id="input-stick-stiffness" min="0" max="100" step="1" value="100">
            <p id="stick-menu-note" style="font-size: 12px; color: #999; line-height: 1.5;">
                Delete this stick or append another one to the end of the chain.
            </p>
            <div class="modal-buttons">
                <button id="btn-delete-stick">Delete</button>
                <button id="btn-close-stick-menu">Close</button>
                <button class="primary" id="btn-save-stick">Save</button>
                <button class="primary" id="btn-add-next-stick">Add Next Stick</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-pencil">
        <div class="modal-content">
            <h3 id="modal-pencil-title">Edit Pencil</h3>
            <label>Trace Duration (s):</label>
            <input type="number" class="modal-input" id="input-pencil-duration" min="0" max="30" step="0.5" value="3">
            <label>Color:</label>
            <input type="color" class="modal-input" id="input-pencil-color" value="#00ff00">
            <div class="modal-buttons">
                <button id="btn-delete-pencil" style="display: none;">Delete</button>
                <button id="btn-cancel-pencil">Cancel</button>
                <button class="primary" id="btn-confirm-pencil">OK</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        window.__APP_BUILD_STAMP__ = '__BUILD_STAMP__';
    </script>
    <script src="src/utils/math.js?v=20260408b"></script>
    <script src="src/models/Disc.js?v=20260408b"></script>
    <script src="src/models/Stick.js?v=20260409c"></script>
    <script src="src/models/StickChain.js?v=20260408b"></script>
    <script src="src/models/Pencil.js?v=20260408b"></script>
    <script src="src/models/Anchor.js?v=20260408c"></script>
    <script src="src/models/System.js?v=20260408c"></script>
    <script src="src/config.js?v=20260409b"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml-matrix@6.12.1/matrix.umd.js"></script>
    <script src="src/engine/KinematicSolver.js?v=20260408c"></script>
    <script src="src/engine/EnergySolver.js?v=20260409e"></script>
    <script src="src/engine/HybridSolver.js?v=20260409c"></script>
    <script src="src/renderer/CanvasRenderer.js?v=20260408c"></script>
    <script src="src/ui/DrawingTools.js?v=20260409d"></script>
    <script src="src/ui/PlaybackControls.js?v=20260408b"></script>
    <script src="src/app.js?v=20260408c"></script>
</body>
</html>
